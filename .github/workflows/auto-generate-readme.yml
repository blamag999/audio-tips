name: Auto Generate README

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate README
        run: |
          echo "# 📚 Documents" > README.md
          echo "" >> README.md

          for file in $(git ls-files "*.md" | grep -v README.md); do
            date=$(git log --diff-filter=A --follow --format=%aI -1 "$file" | cut -c1-10)
            echo "$date|$file"
          done | sort -r | while IFS="|" read date file; do
            name=$(basename "$file")
            echo "- $date [$name]($file)" >> README.md
          done

      - name: Commit README
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Auto update README"
          git push
