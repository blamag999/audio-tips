import os
import subprocess
from datetime import datetime

IGNORE = {".git", ".github", "__pycache__", "README.md"}

def get_last_commit_date(file_path):
    try:
        result = subprocess.check_output(
            ["git", "log", "-1", "--format=%ct", file_path]
        ).decode().strip()

        if result:
            return int(result)
    except:
        pass
    return 0


files = []

for root, dirs, filenames in os.walk("."):
    dirs[:] = [d for d in dirs if d not in IGNORE]

    for f in filenames:
        path = os.path.join(root, f)

        if f in IGNORE:
            continue

        if path.startswith("./"):
            path = path[2:]

        timestamp = get_last_commit_date(path)

        files.append({
            "path": path,
            "time": timestamp
        })


# sort by newest first
files.sort(key=lambda x: x["time"], reverse=True)


with open("README.md", "w", encoding="utf-8") as readme:

    readme.write("# Repository Index\n\n")
    readme.write("Sorted by latest upload/update\n\n")

    readme.write("| File | Last Update |\n")
    readme.write("|------|-------------|\n")

    for f in files:

        if f["time"]:
            date = datetime.utcfromtimestamp(f["time"]).strftime("%Y-%m-%d")
        else:
            date = "Unknown"

        readme.write(
            f"| [{f['path']}]({f['path']}) | {date} |\n"
        )
