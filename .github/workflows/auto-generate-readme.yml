import os
import subprocess
from datetime import datetime

IGNORE_DIRS = {".git", ".github", "__pycache__"}
IGNORE_FILES = {"README.md"}

def last_commit_time(path):
    try:
        ts = subprocess.check_output(
            ["git", "log", "-1", "--format=%ct", path],
            stderr=subprocess.DEVNULL
        ).decode().strip()

        return int(ts) if ts else 0
    except:
        return 0


files = []

for root, dirs, filenames in os.walk("."):
    dirs[:] = [d for d in dirs if d not in IGNORE_DIRS]

    for f in filenames:

        if f in IGNORE_FILES:
            continue

        path = os.path.join(root, f)

        if path.startswith("./"):
            path = path[2:]

        ts = last_commit_time(path)

        files.append({
            "path": path,
            "folder": os.path.dirname(path) or "root",
            "time": ts
        })


# sort newest first
files.sort(key=lambda x: x["time"], reverse=True)


# group by folder
folders = {}

for f in files:
    folders.setdefault(f["folder"], []).append(f)


with open("README.md", "w", encoding="utf-8") as r:

    r.write("# Repository Index\n\n")
    r.write("Auto-generated file list sorted by last update.\n\n")

    total = len(files)
    r.write(f"**Total files:** {total}\n\n")

    for folder in sorted(folders):

        r.write(f"## 📂 {folder}\n\n")

        r.write("| File | Last Update |\n")
        r.write("|------|-------------|\n")

        for f in folders[folder]:

            if f["time"]:
                date = datetime.utcfromtimestamp(
                    f["time"]
                ).strftime("%Y-%m-%d")
            else:
                date = "Unknown"

            r.write(
                f"| [{os.path.basename(f['path'])}]({f['path']}) | {date} |\n"
            )

        r.write("\n")
